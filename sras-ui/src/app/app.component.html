<mat-toolbar color="primary" class="app-toolbar">
  <a class="brand" [routerLink]="logoLink()">
    <span class="logo-dot" aria-hidden="true"></span>
    <span>TalentSync</span>
  </a>
  <span class="spacer"></span>

  @if (isLoggedIn()) {
  @if (!isManager()) {
  <!-- Employee nav -->
  <a mat-button routerLink="/employees" routerLinkActive="active-link">
    <mat-icon>person</mat-icon><span>My Profile</span>
  </a>
  <a mat-button routerLink="/my-dashboard" routerLinkActive="active-link">
    <mat-icon>dashboard</mat-icon><span>My Dashboard</span>
  </a>
  <a mat-button routerLink="/ranking" routerLinkActive="active-link">
    <mat-icon>leaderboard</mat-icon><span>Rankings</span>
  </a>
  }

  @if (isManager()) {
  <!-- Manager nav -->
  <a mat-button routerLink="/projects" routerLinkActive="active-link">
    <mat-icon>folder</mat-icon><span>Projects</span>
  </a>
  <a mat-button routerLink="/matching" routerLinkActive="active-link">
    <mat-icon>group_work</mat-icon><span>Matching</span>
  </a>
  <a mat-button routerLink="/manager-dashboard" routerLinkActive="active-link">
    <mat-icon>dashboard</mat-icon><span>Dashboard</span>
  </a>
  <a mat-button routerLink="/ranking" routerLinkActive="active-link">
    <mat-icon>leaderboard</mat-icon><span>Rankings</span>
  </a>
  }

  <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-trigger">
    <mat-icon class="avatar-icon">account_circle</mat-icon>
    <span class="role-badge">{{ isManager() ? 'Manager' : 'Employee' }}</span>
    <mat-icon class="chevron-icon">expand_more</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu" class="user-dropdown">
    <div class="menu-user-header" mat-menu-item disabled>
      <mat-icon>account_circle</mat-icon>
      <span class="menu-email">{{ userEmail() }}</span>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()" class="logout-item">
      <mat-icon>logout</mat-icon>
      <span>Sign Out</span>
    </button>
  </mat-menu>
  }
</mat-toolbar>

<main class="main-content">
  <router-outlet />
</main>
