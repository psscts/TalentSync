@if (isLoggedIn()) {
<mat-toolbar color="primary">
  <span class="brand">SRAS</span>
  <span class="spacer"></span>

  @if (!isManager()) {
    <!-- Employee nav -->
    <a mat-button routerLink="/employees" routerLinkActive="active-link">
      <mat-icon>person</mat-icon> My Profile
    </a>
    <a mat-button routerLink="/my-dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon> My Dashboard
    </a>
    <a mat-button routerLink="/ranking" routerLinkActive="active-link">
      <mat-icon>leaderboard</mat-icon> Rankings
    </a>
  }

  @if (isManager()) {
    <!-- Manager nav -->
    <a mat-button routerLink="/projects" routerLinkActive="active-link">
      <mat-icon>folder</mat-icon> Projects
    </a>
    <a mat-button routerLink="/matching" routerLinkActive="active-link">
      <mat-icon>group_work</mat-icon> Matching
    </a>
    <a mat-button routerLink="/manager-dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon> Dashboard
    </a>
    <a mat-button routerLink="/ranking" routerLinkActive="active-link">
      <mat-icon>leaderboard</mat-icon> Rankings
    </a>
  }

  <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-trigger">
    <mat-icon>account_circle</mat-icon>
    <span class="user-info">
      {{ userEmail() }}
      <span class="role-badge">{{ isManager() ? 'Manager' : 'Employee' }}</span>
    </span>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  </mat-menu>
</mat-toolbar>
}

<main class="main-content">
  <router-outlet />
</main>
