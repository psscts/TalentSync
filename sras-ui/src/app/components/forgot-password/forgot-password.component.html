<div class="card-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Forgot Password</mat-card-title>
      <mat-card-subtitle>Enter your email to receive a reset token</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (!resetToken) {
        <form [formGroup]="form" (ngSubmit)="submit()" class="form-body">
          <mat-form-field class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="email">
            @if (form.get('email')?.hasError('email')) {
              <mat-error>Enter a valid email</mat-error>
            }
          </mat-form-field>

          <button mat-raised-button color="primary" class="full-width mt-16"
                  type="submit" [disabled]="form.invalid || loading">
            @if (loading) { <mat-spinner diameter="20"></mat-spinner> }
            @else { Send Reset Token }
          </button>
        </form>
      } @else {
        <div class="token-display">
          <p>Your reset token:</p>
          <code class="token-code">{{ resetToken }}</code>
          <p class="hint">This token expires in 15 minutes.</p>
          <a mat-raised-button color="primary" routerLink="/reset-password" class="full-width mt-16">
            Go to Reset Password
          </a>
        </div>
      }
    </mat-card-content>

    <mat-card-actions align="end">
      <span>Remember your password? <a routerLink="/login">Sign in</a></span>
    </mat-card-actions>
  </mat-card>
</div>
